<div id="kitchen-display-app">
    <div class="kds-header">
        <div class="kds-header-left">
            <h3 class="kds-title">👨‍🍳 Kitchen Display</h3>
            <span class="kds-subtitle">Live Orders</span>
        </div>
        <div class="kds-header-center">
            <select id="kds-branch" class="form-control"
                style="background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; width: 200px; padding: 5px 10px;">
                <option value="" style="color: #000;">All Branches</option>
            </select>
        </div>
        <div class="kds-header-right">
            <span id="kds-clock" class="kds-clock"></span>
            <span id="kds-order-count" class="kds-badge">0 active</span>
            <button id="kds-fullscreen" class="btn btn-kds-action" title="Fullscreen">
                <i class="fa fa-expand"></i>
            </button>
        </div>
    </div>

    <div class="kds-orders" id="kds-orders">
        <div class="kds-empty">
            <i class="fa fa-check-circle fa-4x"></i>
            <h3>All Clear!</h3>
            <p>No pending orders</p>
        </div>
    </div>
</div>
